<!DOCTYPE html>
<html>
<head>
    <title>Ask My Documents — FCA RAG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        h1 { color: #0f172a; margin: 0 0 8px 0; font-size: 28px; }
        .subtitle { color: #64748b; margin: 0 0 28px 0; font-size: 15px; }

        #clearBtn {
            background: none;
            border: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        #clearBtn:hover { background: #f1f5f9; color: #ef4444; border-color: #fca5a5; }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        textarea {
            flex: 1;
            padding: 14px;
            font-size: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #6366f1; }

        button.ask {
            background: #6366f1;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            height: fit-content;
            white-space: nowrap;
        }
        button.ask:hover { background: #4f46e5; }
        button.ask:disabled { background: #c7d2fe; cursor: not-allowed; }

        #loading { display: none; color: #6366f1; margin-top: 16px; font-size: 14px; }
        .examples { margin-top: 12px; font-size: 13px; color: #94a3b8; }

        #history { margin-top: 30px; }
        .qa-pair {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f1f5f9;
        }
        .qa-pair:last-child { border-bottom: none; }
        .q-bubble {
            background: #eef2ff;
            color: #3730a3;
            padding: 10px 16px;
            border-radius: 10px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .a-bubble {
            padding: 16px 20px;
            background: #f8fafc;
            border-left: 4px solid #6366f1;
            border-radius: 8px;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #1e293b;
            font-size: 15px;
        }
        .empty-history {
            text-align: center;
            color: #cbd5e1;
            font-size: 14px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-row">
            <div>
                <h1>📄 Ask My Documents</h1>
                <p class="subtitle">Ask about FCA financial penalties — who was fined, how much, and why.</p>
            </div>
            <button id="clearBtn" onclick="clearHistory()">Clear history</button>
        </div>

        <div class="input-row">
            <textarea id="question" rows="2" placeholder="e.g. Which firms were fined for AML failures?"></textarea>
            <button class="ask" id="askBtn">Ask</button>
        </div>
        <div class="examples">Try: "What was Nationwide fined for?" or "Summarise the Barclays case" — Shift+Enter to send</div>

        <div id="loading">🤔 Thinking...</div>

        <div id="history">
            <p class="empty-history" id="emptyMsg">Your questions and answers will appear here.</p>
        </div>
    </div>

    <script>
        document.getElementById("askBtn").addEventListener("click", askQuestion);

        document.getElementById("question").addEventListener("keydown", function(e) {
            if (e.key === "Enter" && e.shiftKey) {
                e.preventDefault();
                askQuestion();
            }
        });

        async function askQuestion() {
            var input = document.getElementById("question");
            var question = input.value.trim();
            if (!question) return;

            var loadingDiv = document.getElementById("loading");
            var btn = document.getElementById("askBtn");

            loadingDiv.style.display = "block";
            btn.disabled = true;
            input.value = "";

            try {
                var response = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question })
                });
                var data = await response.json();
                loadingDiv.style.display = "none";
                addToHistory(question, data.answer);
            } catch (err) {
                loadingDiv.style.display = "none";
                addToHistory(question, "Error: " + err);
            } finally {
                btn.disabled = false;
            }
        }

        function addToHistory(question, answer) {
            var emptyMsg = document.getElementById("emptyMsg");
            if (emptyMsg) emptyMsg.remove();

            var historyDiv = document.getElementById("history");

            var pair = document.createElement("div");
            pair.className = "qa-pair";

            var qBubble = document.createElement("div");
            qBubble.className = "q-bubble";
            qBubble.innerText = "Q: " + question;

            var aBubble = document.createElement("div");
            aBubble.className = "a-bubble";
            aBubble.innerText = answer;

            pair.appendChild(qBubble);
            pair.appendChild(aBubble);

            historyDiv.insertBefore(pair, historyDiv.firstChild);
        }

        function clearHistory() {
            var historyDiv = document.getElementById("history");
            historyDiv.innerHTML = '<p class="empty-history" id="emptyMsg">Your questions and answers will appear here.</p>';
        }
    </script>
</body>
</html>
